services:
  mysql:
    image: mysql:8.4
    container_name: brasileirao_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: brasileirao
      MYSQL_USER: brasileirao
      MYSQL_PASSWORD: brasileirao
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - brasileirao_network

  backend:
    build:
      context: ./brasileirao-api
      dockerfile: Dockerfile
    container_name: brasileirao_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./brasileirao-api:/var/www
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    networks:
      - brasileirao_network
    command: sh -c "composer install && php artisan key:generate --force && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=8000"

  scheduler:
    build:
      context: ./brasileirao-api
      dockerfile: Dockerfile
    container_name: brasileirao_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./brasileirao-api:/var/www
    depends_on:
      - mysql
    networks:
      - brasileirao_network
    command: sh -c "composer install --no-interaction && php artisan schedule:work"

  frontend:
    build:
      context: ./brasileirao-front
      dockerfile: Dockerfile
    container_name: brasileirao_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - brasileirao_network
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:8000/api

volumes:
  mysql_data:

networks:
  brasileirao_network:
    driver: bridge