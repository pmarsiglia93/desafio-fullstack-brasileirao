frontend:
  build:
    context: ./brasileirao-front
    dockerfile: Dockerfile
  container_name: brasileirao_frontend
  restart: unless-stopped
  working_dir: /app
  volumes:
    - ./brasileirao-front:/app
    - /app/node_modules
  ports:
    - "3000:3000"
  depends_on:
    - backend
  networks:
    - brasileirao_network
  command: sh -c "npm install && npm run build && npm run start -- --hostname 0.0.0.0 --port 3000"